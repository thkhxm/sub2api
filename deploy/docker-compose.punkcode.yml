# =============================================================================
# PunkcodeAI Dev Override
# =============================================================================
# 作为 docker-compose.dev.yml 的 override，添加 PunkcodeAI 专用：
#   - punkcode-seed：在 sub2api 健康后写入 settings 表，开启注册、关闭邀请码/邮件验证
#
# 用法：
#   docker compose -f docker-compose.dev.yml -f docker-compose.punkcode.yml \
#     --env-file .env.punkcode up --build
# =============================================================================

services:
  # 给 sub2api 注入 PunkcodeAI 专属环境变量（追加，不替换 dev.yml 已有的）
  sub2api:
    environment:
      # /cli/llm 用 cfg.Server.FrontendURL 作为 LLM 网关 base_url 兜底
      - SERVER_FRONTEND_URL=${SERVER_FRONTEND_URL:-http://localhost:38080}
      # CORS：桌面端 fetch 不带 cookie credentials（只用 Bearer token），dev 用 '*' 最省事。
      # 关键：dev 模式 Electron 加载的是 vite dev server（http://localhost:5173/5174，端口会变），
      #       打包后才是 oc://renderer——两套 origin，dev 用 '*' 一律放行避免端口漂移踩坑。
      # prod 必须收敛为具体 origin：CORS_ALLOWED_ORIGINS=oc://renderer（见 PUNKCODE_PROD.md）。
      - CORS_ALLOWED_ORIGINS=${CORS_ALLOWED_ORIGINS:-*}

  # 在 sub2api 启动后写入 settings 表，让 PunkcodeAI 桌面端能直接注册
  punkcode-seed:
    image: postgres:18-alpine
    container_name: punkcode-sub2api-seed
    depends_on:
      sub2api:
        condition: service_healthy
    environment:
      PGHOST: postgres
      PGPORT: "5432"
      PGUSER: ${POSTGRES_USER:-sub2api}
      PGPASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      PGDATABASE: ${POSTGRES_DB:-sub2api}
    volumes:
      - ./punkcode-seed.sh:/punkcode-seed.sh:ro
    entrypoint: ["/bin/sh", "/punkcode-seed.sh"]
    restart: "no"
    networks:
      - sub2api-network
