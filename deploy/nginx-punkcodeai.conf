# =============================================================================
# PunkcodeAI nginx 反代（宝塔 vhost server block）
# =============================================================================
# 站点：<DOMAIN>  ->  反代到 127.0.0.1:38080（PunkcodeAI 二开 sub2api）
#
# ⚠️ <DOMAIN> 为脱敏占位符，部署时用 sed 替换为真实域名（真实值见思源 /sub2api/配置与部署）
#
# 放置位置（宝塔约定）：
#   /www/server/panel/vhost/nginx/<DOMAIN>.conf
# 放好后：nginx -t && nginx -s reload   或宝塔面板「重载配置」
#
# 与旧 sub2api 的隔离：
#   - 旧 sub2api 用 8080；本反代后端是 127.0.0.1:38080，互不影响。
#   - 宿主 80/443 由宝塔 nginx 统一管理（多站点 server_name 区分），
#     本文件只是新增一个 server_name=<DOMAIN> 的 vhost，不动其它站点。
#
# 证书（宝塔约定路径，主线把本地 *_bundle.crt -> fullchain.pem、*.key -> privkey.pem 拷过去）：
#   /www/server/panel/vhost/cert/<DOMAIN>/fullchain.pem
#   /www/server/panel/vhost/cert/<DOMAIN>/privkey.pem
# =============================================================================

# -----------------------------------------------------------------------------
# HTTP(80) -> 强制跳转 HTTPS，保留 ACME 证书续期挑战路径
# -----------------------------------------------------------------------------
server {
    listen 80;
    listen [::]:80;
    server_name <DOMAIN>;

    # 证书续期（Let's Encrypt / 宝塔自动续签）走 HTTP-01 challenge，不能被重定向吃掉。
    location ^~ /.well-known/acme-challenge/ {
        root /www/wwwroot/punkcodeai-acme;
        default_type "text/plain";
        try_files $uri =404;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# -----------------------------------------------------------------------------
# HTTPS(443) 主站
# -----------------------------------------------------------------------------
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name <DOMAIN>;

    # ---- TLS 证书（宝塔 vhost 标准路径）----
    ssl_certificate     /www/server/panel/vhost/cert/<DOMAIN>/fullchain.pem;
    ssl_certificate_key /www/server/panel/vhost/cert/<DOMAIN>/privkey.pem;

    # ---- TLS 参数（仅 1.2 / 1.3）----
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL_punkcodeai:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;
    add_header Strict-Transport-Security "max-age=31536000" always;

    # ---- 大文件 / 图片上传（图片生成可能携带较大 payload）----
    client_max_body_size 100M;

    # ---- gzip（仅对文本类压缩；SSE/图片不压缩）----
    gzip on;
    gzip_vary on;
    gzip_comp_level 5;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_types text/plain text/css text/xml application/json application/javascript application/xml+rss application/atom+xml image/svg+xml;

    # WebSocket/Connection upgrade 映射（SSE 走 http/1.1 时把 Connection 置空更稳）
    # 注意：map 必须放在 http{} 级别。宝塔默认在 http{} 已有通用 $connection_upgrade map；
    #       若报 "duplicate ... $connection_upgrade"，删掉本处 map 复用宝塔内置即可。
    # 此处不重复定义 map，统一在 location 里显式处理 Connection 头（见下）。

    # ---- electron-updater feed 静态文件目录 ----
    # 桌面端 electron-updater 从 https://<DOMAIN>/updates/ 拉 latest.yml + 安装包。
    # 由 nginx 直接 file_server，autoindex 关闭（不暴露目录列表）。
    location /updates/ {
        alias /www/wwwroot/punkcodeai-updates/;
        autoindex off;
        # 安装包较大，关闭 sendfile 限速、允许断点续传
        add_header Cache-Control "no-cache";
        try_files $uri =404;
    }

    # ---- 反代到 PunkcodeAI 后端（含 SSE 流式）----
    location / {
        proxy_pass http://127.0.0.1:38080;

        # 标准反代头
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host  $host;

        # ---- SSE / 流式（LLM 对话、图片生成流）支持 ----
        # 关闭缓冲，事件实时下发；长读超时容纳长对话/出图。
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_buffering off;
        proxy_cache off;
        proxy_request_buffering off;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
        chunked_transfer_encoding on;
    }
}
